[build]
  command = "npm run build"
  publish = "dist/client"
  functions = ".netlify/v1/functions"

# Netlify scans static HTML in dist/client at deploy time (see public/*.html).
# Enable: Site → Forms → Enable form detection, then redeploy.

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev"
  port = 3000

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/apple-touch-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/health-intake.html"
  to = "/health-intake.html"
  status = 200

[[redirects]]
  from = "/mailing-list.html"
  to = "/mailing-list.html"
  status = 200
