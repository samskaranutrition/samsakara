[build]
  command = "npm run build"
  publish = "dist/client"
  functions = ".netlify/v1/functions"

# Netlify scans static HTML in the publish directory at deploy time for <form netlify>.
# TanStack Start is SSR — forms in index.html are not published; see public/netlify-forms.html.

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev"
  port = 3000

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/apple-touch-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
